version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lmw_postgres_orchestrator
    environment:
      POSTGRES_USER: ${DB_USER:-lmw_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lmw_password}
      POSTGRES_DB: ${DB_NAME:-lmw_database}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lmw_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lmw_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: lmw_mongodb_orchestrator
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-lmw_mongodb}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lmw_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Learner Orchestrator Service
  learner-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learner_orchestrator
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lmw_database}
      DB_USER: ${DB_USER:-lmw_user}
      DB_PASSWORD: ${DB_PASSWORD:-lmw_password}
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: ${MONGO_DB:-lmw_mongodb}
      SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - lmw_network
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local

networks:
  lmw_network:
    driver: bridge
