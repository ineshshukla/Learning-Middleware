version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: lmw_postgres
    environment:
      POSTGRES_DB: lmw_database
      POSTGRES_USER: lmw_user
      POSTGRES_PASSWORD: lmw_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lmw_network

  mongodb:
    image: mongo:7
    container_name: lmw_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: lmw_user
      MONGO_INITDB_ROOT_PASSWORD: lmw_password
      MONGO_INITDB_DATABASE: lmw_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lmw_network

volumes:
  postgres_data:
  mongo_data:

networks:
  lmw_network:
    driver: bridge