services:
  postgres:
    image: postgres:15
    container_name: lmw_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lmw_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: lmw_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGODB_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lmw_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  sme:
    build:
      context: ./sme
      dockerfile: Dockerfile
    container_name: lmw_sme
    environment:
      PORT: ${SME_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      VLLM_4B_URL: ${VLLM_4B_URL}
      VLLM_4B_MODEL: ${VLLM_4B_MODEL}
      VLLM_1_7B_URL: ${VLLM_1_7B_URL}
      VLLM_1_7B_MODEL: ${VLLM_1_7B_MODEL}
      VLLM_TIMEOUT: ${VLLM_TIMEOUT}
      VLLM_RETRIES: ${VLLM_RETRIES}
    ports:
      - "${SME_PORT}:8000"
    volumes:
      - ./sme/data:/app/data
      - ./sme/outputs:/app/outputs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lmw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  learner:
    build:
      context: ./learner
      dockerfile: Dockerfile
    container_name: lmw_learner
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      PORT: ${LEARNER_PORT}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      API_V1_STR: ${API_V1_STR_LEARNER}
      PROJECT_NAME: ${PROJECT_NAME_LEARNER}
    ports:
      - "${LEARNER_PORT}:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lmw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  instructor:
    build:
      context: ./instructor
      dockerfile: Dockerfile
    container_name: lmw_instructor
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      API_V1_STR: ${API_V1_STR_INSTRUCTOR}
      PROJECT_NAME: ${PROJECT_NAME_INSTRUCTOR}
      UPLOAD_DIR: ${UPLOAD_DIR}
      PORT: ${INSTRUCTOR_PORT}
      SME_SERVICE_URL: ${SME_SERVICE_URL}
    ports:
      - "${INSTRUCTOR_PORT}:8003"
    volumes:
      - ./instructor/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      sme:
        condition: service_healthy
      learner:
        condition: service_healthy
    networks:
      - lmw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  learner-orchestrator:
    build:
      context: ./learner-orchestrator
      dockerfile: Dockerfile
    container_name: lmw_learner_orchestrator
    environment:
      # Application
      PROJECT_NAME: ${PROJECT_NAME_ORCHESTRATOR}
      SERVICE_PORT: ${LEARNER_ORCHESTRATOR_PORT}
      
      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      
      # MongoDB
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      MONGO_DB: ${MONGO_INITDB_DATABASE}
      
      # External Services
      LEARNER_SERVICE_URL: ${LEARNER_SERVICE_URL}
      SME_SERVICE_URL: ${SME_SERVICE_URL}
      INSTRUCTOR_SERVICE_URL: ${INSTRUCTOR_SERVICE_URL}
    ports:
      - "${LEARNER_ORCHESTRATOR_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - lmw_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  mongo_data:

networks:
  lmw_network:
    driver: bridge